<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dinero Explorer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1000 1000'><g fill='none' stroke='%237c6af7' stroke-linecap='round' stroke-linejoin='round'><path d='M290 170H430C635 170 780 315 780 500C780 685 635 830 430 830H290Z' stroke-width='110'/><line x1='360' y1='90' x2='360' y2='910' stroke-width='72'/><line x1='490' y1='90' x2='490' y2='910' stroke-width='72'/></g></svg>" type="image/svg+xml">
</head>
<body>
  <header>
    <div class="container">
      <a href="#/" class="logo">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" aria-hidden="true">
          <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M290 170H430C635 170 780 315 780 500C780 685 635 830 430 830H290Z" stroke-width="110"/>
            <line x1="360" y1="90" x2="360" y2="910" stroke-width="72"/>
            <line x1="490" y1="90" x2="490" y2="910" stroke-width="72"/>
          </g>
        </svg>
        <span class="logo-text">Dinero Explorer</span>
      </a>
      <form class="search-form" id="searchForm">
        <input type="text" id="searchInput" placeholder="Search block height, tx hash, or address…" autocomplete="off" spellcheck="false">
        <button type="submit">Search</button>
      </form>
    </div>
  </header>

  <main id="app">
    <div class="loading">Loading…</div>
  </main>

  <footer>
    <div class="container">
      <span>Dinero Network · <span id="footerHeight">—</span> blocks</span>
      <span>Built on <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a></span>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
