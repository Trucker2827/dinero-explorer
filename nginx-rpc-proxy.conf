# Dinero public RPC proxy
# Place at: /etc/nginx/sites-available/rpc.dinero-coin.com
# Enable:   ln -s /etc/nginx/sites-available/rpc.dinero-coin.com /etc/nginx/sites-enabled/
# Cert:     certbot --nginx -d rpc.dinero-coin.com

# Whitelist of safe read-only RPC methods (no auth, no wallet methods)
map $request_body $rpc_method {
    ~"\"method\"\s*:\s*\"([^\"]+)\"" $1;
    default                          "unknown";
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=rpc_limit:10m rate=30r/m;

server {
    listen 80;
    server_name rpc.dinero-coin.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rpc.dinero-coin.com;

    # SSL (certbot fills these in)
    ssl_certificate     /etc/letsencrypt/live/rpc.dinero-coin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpc.dinero-coin.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # CORS — allow GitHub Pages and any origin (public explorer)
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # Preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Only POST allowed
    if ($request_method != POST) {
        return 405;
    }

    # Rate limit
    limit_req zone=rpc_limit burst=20 nodelay;

    location / {
        # Forward to local Dinero daemon JSON-RPC with auth injected from server side.
        # Port 20998 is the dinerod RPC port (NOT Bitcoin's 8332).
        # Generate __BASE64_COOKIE__ from dinero.conf rpcuser/rpcpassword:
        #   echo -n 'rpcuser:rpcpassword' | base64
        proxy_pass         http://127.0.0.1:20998;
        proxy_set_header   Authorization "Basic __BASE64_COOKIE__";
        proxy_set_header   Content-Type  "application/json";
        proxy_read_timeout 30s;

        # Block wallet methods — public explorer must not expose wallet RPCs
        # nginx content_by_lua would be cleaner but this regex covers the surface:
        if ($request_body ~* '"method"\s*:\s*"wallet\.') {
            return 403 '{"error":{"code":-32600,"message":"Wallet methods not exposed"}}';
        }
        if ($request_body ~* '"method"\s*:\s*"mining\.') {
            return 403 '{"error":{"code":-32600,"message":"Mining methods not exposed"}}';
        }
    }
}
